name: Run Decoder

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  run-decoder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-
      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          load: true
          tags: decoder-image:latest
          cache-from: |
            type=local,src=/tmp/.buildx-cache
          cache-to: |
            type=local,dest=/tmp/.buildx-cache-new,mode=max
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
      - name: Create output directories
        run: |
          mkdir -p ${{ github.workspace }}/plots/cluster
          mkdir -p ${{ github.workspace }}/results
          mkdir -p ${{ github.workspace }}/artifacts/hf_cache
          mkdir -p ${{ github.workspace }}/artifacts/label_encoder_cache_minilm_universal
          chmod -R 777 ${{ github.workspace }}/plots
          chmod -R 777 ${{ github.workspace }}/results
          chmod -R 777 ${{ github.workspace }}/artifacts
      - name: Verify workflow inputs
        run: |
          test -f ${{ github.workspace }}/metta.pkl
      - name: Verify semantic checkpoint files
        run: |
          test -f ${{ github.workspace }}/ckpt/universal/model_universal_hybrid_minilm_rgcn.pt
          test -f ${{ github.workspace }}/ckpt/universal/model_universal_hybrid_minilm_rgcn.pt.meta.json
      - name: Check available processors and usage percentage
        id: cpu-check
        run: |
          TOTAL_CPUS=$(nproc)
          USED_CPUS=4
          PERCENT_USED=$(( 100 * USED_CPUS / TOTAL_CPUS ))
          echo "Total available processors: $TOTAL_CPUS"
          echo "Processors used for decoder: $USED_CPUS"
          echo "Percent of processors used: ${PERCENT_USED}%"
          echo "total_cpus=$TOTAL_CPUS" >> $GITHUB_OUTPUT
          echo "percent_used=$PERCENT_USED" >> $GITHUB_OUTPUT

      - name: Run semantic decoder in Docker container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -e PYTHONUNBUFFERED=1 \
            -e HF_TOKEN=${{ secrets.HF_TOKEN }} \
            -e HUGGING_FACE_HUB_TOKEN=${{ secrets.HF_TOKEN }} \
            -e HF_HOME=/app/artifacts/hf_cache \
            -e SENTENCE_TRANSFORMERS_HOME=/app/artifacts/hf_cache/sentence_transformers \
            decoder-image:latest \
            bash -c "
              set -euo pipefail
              echo 'Preparing MiniLM semantic label cache for metta.pkl...'
              python scripts/precompute_label_cache.py \
                --graph_pkl metta.pkl \
                --cache_dir /app/artifacts/label_encoder_cache_minilm_universal \
                --backend sentence_transformers \
                --label_encoder_name sentence-transformers/all-MiniLM-L6-v2 \
                --batch_size 128

              echo 'Verifying cache-only semantic path...'
              python scripts/precompute_label_cache.py \
                --graph_pkl metta.pkl \
                --cache_dir /app/artifacts/label_encoder_cache_minilm_universal \
                --backend cache_only \
                --label_encoder_name sentence-transformers/all-MiniLM-L6-v2 \
                --batch_size 128

              echo 'Starting semantic decoder run on metta.pkl...'
              python -m subgraph_mining.decoder \
                --dataset=metta.pkl \
                --graph_type=directed \
                --model_path=/app/ckpt/universal/model_universal_hybrid_minilm_rgcn.pt \
                --vocab_dir=/app/artifacts/vocab_ci_semantic \
                --n_trials=20 \
                --n_neighborhoods=25 \
                --min_pattern_size=3 \
                --max_pattern_size=4 \
                --min_neighborhood_size=3 \
                --max_neighborhood_size=6 \
                --search_strategy=greedy \
                --memory_efficient \
                --out_batch_size=2 \
                --streaming_workers=0 \
                --out_path=/app/results/semantic_patterns.pkl \
                2>&1 | tee /app/semantic_decoder.log

              echo 'Checking output directories...'
              test -f /app/results/semantic_patterns.pkl
              test -f /app/results/semantic_patterns.json
              ls -la /app/plots/cluster
              ls -la /app/results
              "
      # - name: Run pattern counter in Docker container
      #   run: |
      #     docker run --rm \
      #       -v ${{ github.workspace }}:/app \
      #       -e PYTHONUNBUFFERED=1 \
      #       decoder-image:latest \
      #       bash -c "
      #         set -e
      #         export PYTHONPATH=/app
      #         echo 'Running pattern counter...'
      #         python -m analyze.count_patterns \
      #           --dataset=metta.pkl \
      #           --queries_path=results/patterns.pkl \
      #           --out_path=results/ \
      #           --node_anchored \

      #         echo 'Counting completed.'
      #         ls -la /app/results
      #       "
      # - name: Run matcher in Docker container
      #  run: |
      #   docker run --rm \
      #    -v ${{ github.workspace }}:/app \
      #   -e PYTHONUNBUFFERED=1 \
      #  decoder-image:latest \
      # bash -c "
      #  set -e
      # echo 'Starting matcher run on custom gene graph...'
      #ython -m subgraph_matching.train \
      # --dataset=graph \
      #--graph_pkl_path=graph.pkl \
      #--node_anchored \
      #--batch_size 16 \
      #--val_size 128
      #echo 'Checking output directories...'
      #ls -la /app/results
      # ls -la /app/plots
      #"
      #         echo 'Starting matcher run on custom gene graph...'
      #         python -m subgraph_matching.train \
      #           --dataset=graph \
      #           --graph_pkl_path=graph.pkl \
      #           --node_anchored \
      #           --batch_size 16 \
      #           --val_size 128
      #         echo 'Checking output directories...'
      #         ls -la /app/results
      #         ls -la /app/plots
      #       "

      - name: Check for generated files
        run: |
          echo "Checking plots directory:"
          ls -R plots/ || echo "No plots directory found"
          echo "Checking results directory:"
          ls -R results/ || echo "No results directory found"
      - name: Upload plots as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: decoder-plots
          path: |
            plots/
            results/
          retention-days: 7
          if-no-files-found: warn

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: decoder-logs
          path: |
            *.log
            *.err
          if-no-files-found: ignore
